# Example experiment config (will be wired in runner implementation)
task:
  name: sudoku
  train_path: data/sudoku/sudoku-extreme-1k-aug-1000/train.csv
  val_path: data/sudoku/sudoku-extreme-1k-aug-1000/test.csv

model:
  name: trm
  vocab_size: 11
  seq_len: 81
  d_model: 256
  n_heads: 8
  n_layers: 2
  use_attention: true
  H_cycles: 3
  L_cycles: 6
  N_sup: 16

scheduler:
  name: cgar
  pdc_thresholds: [0.3, 0.6]
  pdc_stages:
    - [2, 1]
    - [4, 2]
    - [6, 3]
  lambda_decay: 0.7

train:
  seed: 42
  device: auto
  epochs: 1
  batch_size: 8
  lr: 1.0e-4
  run_dir: runs/dev_trm_cgar_sudoku

