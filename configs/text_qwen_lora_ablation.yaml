task:
  name: wikitext_lm
  dataset_name: wikitext
  dataset_config: wikitext-103-raw-v1
  split_train: train
  split_val: validation
  train_fraction: 0.2
  val_fraction: 1
  tokenizer: tiiuae/Falcon-H1-Tiny-90M-Base
  text_field: text
  seq_len: 256

model:
  name: lora_ablation
  base_model_name: tiiuae/Falcon-H1-Tiny-90M-Base
  lora_r: 8
  lora_alpha: 16
  lora_dropout: 0.05
  N_sup: 1

scheduler:
  name: fixed
  recursion_n: 1
  recursion_T: 1

train:
  seed: 42
  device: auto
  epochs: 1
  batch_size: 16
  lr: 1.0e-4
  live_plots: true
  save_best_only: true
  best_metric: auto
  best_metric_mode: auto
  run_dir: runs/text_falcon90m_lora_ablation
