task:
  name: wikitext_lm
  dataset_name: wikitext
  dataset_config: wikitext-103-raw-v1
  split_train: train
  split_val: validation
  train_fraction: 0.1
  tokenizer: tiiuae/Falcon-H1-Tiny-90M-Base
  text_field: text
  seq_len: 256
model:
  name: frozen_llm_trm_oracle
  base_model_name: tiiuae/Falcon-H1-Tiny-90M-Base
  freeze_backbone: true
  pos_encoding: none
  vocab_size: 32768
  seq_len: 256
  d_model: 256
  n_heads: 8
  n_layers: 2
  d_ff: 1024
  use_attention: true
  H_cycles: 2
  L_cycles: 4
  N_sup: 8
  oracle_max_steps: 8
  oracle_horizon: 8
  oracle_n_heads: 4
  oracle_n_layers: 2
  oracle_d_ff: 512
  oracle_distribution_lambda: 0.01
  halt_head: false
  oracle_target_mode: distribution
  oracle_distribution_model: hybrid
scheduler:
  name: fixed
  recursion_n: 4
  recursion_T: 2
train:
  seed: 42
  device: auto
  epochs: 1
  batch_size: 16
  lr: 0.0003
  live_plots: true
  save_best_only: true
  best_metric: auto
  best_metric_mode: auto
  live_plot_every: 10
  use_halt_loss: false
  run_dir: runs/oracle_sweep_wikitext_falcon/hybrid
