task:
  name: sudoku
  train_path: data/sudoku/sudoku-extreme-100-aug-10/train.csv
  val_path: data/sudoku/sudoku-extreme-100-aug-10/test.csv

model:
  name: trm_oracle
  vocab_size: 11
  seq_len: 81

  # Lightweight-but-meaningful model for dev iteration
  d_model: 192
  n_heads: 4
  n_layers: 2
  d_ff: 768
  use_attention: true

  # Moderate recursion/deep supervision for informative curves
  H_cycles: 2
  L_cycles: 3
  N_sup: 8
  halt_head: false

  # Oracle head (small-medium)
  oracle_max_steps: 8
  oracle_horizon: 8
  oracle_n_heads: 2
  oracle_n_layers: 1
  oracle_d_ff: 256
  oracle_dropout: 0.0
  oracle_loss_weight: 1.0

scheduler:
  name: cgar
  pdc_thresholds: [0.3, 0.6]
  pdc_stages:
    - [1, 1]
    - [2, 1]
    - [2, 2]
  lambda_decay: 0.8

train:
  seed: 42
  device: auto
  epochs: 200
  max_steps: 3000
  batch_size: 256
  lr: 2.0e-4
  weight_decay: 0.1
  log_every: 20
  eval_every: 200
  ckpt_every: 500
  progress_bar: true
  live_plots: true
  save_best_only: true
  best_metric: auto
  best_metric_mode: auto
  run_dir: runs/quick_trm_oracle_10min

