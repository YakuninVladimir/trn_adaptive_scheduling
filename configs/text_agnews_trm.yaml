task:
  name: text_lm
  dataset_name: ag_news
  split_train: train
  split_val: test
  tokenizer: distilbert-base-uncased
  seq_len: 256

model:
  name: trm
  vocab_size: 30522
  seq_len: 256
  d_model: 256
  n_heads: 8
  n_layers: 2
  use_attention: true
  H_cycles: 2
  L_cycles: 4
  N_sup: 8

scheduler:
  name: fixed
  recursion_n: 4
  recursion_T: 2

train:
  seed: 42
  device: auto
  epochs: 1
  batch_size: 8
  lr: 3.0e-4
  live_plots: true
  save_best_only: true
  best_metric: auto
  best_metric_mode: auto
  run_dir: runs/dev_text_agnews_trm

