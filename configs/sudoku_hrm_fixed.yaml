task:
  name: sudoku
  train_path: data/sudoku/sudoku-extreme-1k-aug-1000/train.csv
  val_path: data/sudoku/sudoku-extreme-1k-aug-1000/test.csv

model:
  name: hrm
  vocab_size: 11
  seq_len: 81
  d_model: 256
  n_heads: 8
  n_layers_L: 2
  n_layers_H: 2
  H_cycles: 2
  L_cycles: 2
  N_sup: 16

scheduler:
  name: fixed
  recursion_n: 2
  recursion_T: 2
  lambda_decay: null

train:
  seed: 42
  device: auto
  epochs: 1
  batch_size: 8
  lr: 1.0e-4
  live_plots: true
  save_best_only: true
  best_metric: auto
  best_metric_mode: auto
  run_dir: runs/dev_hrm_fixed_sudoku

