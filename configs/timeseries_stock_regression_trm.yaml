task:
  name: timeseries_regression
  source: stocks
  tickers: [AAPL]
  window: 64
  horizon: 1
  feature: Close
  n_bins: 256

model:
  name: trm
  vocab_size: 256
  seq_len: 64
  d_model: 256
  n_heads: 8
  n_layers: 2
  use_attention: true
  H_cycles: 2
  L_cycles: 4
  N_sup: 8

scheduler:
  name: fixed
  recursion_n: 4
  recursion_T: 2

train:
  seed: 42
  device: auto
  epochs: 1
  batch_size: 32
  lr: 1.0e-3
  run_dir: runs/dev_timeseries_stock_trm

